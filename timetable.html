<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♬✧ 🎒서냉쓰 방과후 시간표⏰ ✧♬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE6;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.15);
    --text: #1A1814; --text-muted: #7A7670; --text-faint: #B0ADA8;
    --accent: #3D6B4F; --accent-light: #E8F2EC; --danger: #C0392B;
    --cell-h: 52px; --header-h: 56px; --time-w: 56px;
    --font: 'Noto Sans KR', sans-serif; --mono: 'DM Mono', monospace;
    --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .app-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 1.5rem; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .app-title { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #B0ADA8; transition: background 0.3s; }
  .sync-dot.syncing { background: #F0A500; animation: pulse 1s infinite; }
  .sync-dot.ok { background: #27AE60; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-family: var(--font); font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--text);
    transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #2f5540; }
  .btn-icon { padding: 7px 10px; }
  .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .btn-delete { color: var(--danger); border-color: rgba(192,57,43,0.2); }
  .btn-delete:hover { background: #FDF0EE; }

  /* NOTICE BAR */
  .notice-bar {
    margin: 0.75rem 1.5rem 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: background 0.15s;
    box-shadow: var(--shadow);
  }
  .notice-bar:hover { background: var(--accent-light); }
  .notice-icon { color: var(--accent); flex-shrink: 0; }
  .notice-text {
    flex: 1; font-size: 13px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .notice-text.has-content { color: var(--text); }
  .notice-edit-hint { font-size: 11px; color: var(--text-faint); flex-shrink: 0; }

  /* TIMETABLE */
  .timetable-wrap { padding: 0.75rem 1.5rem 2rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .timetable {
    display: grid; grid-template-columns: var(--time-w) repeat(5, 1fr);
    min-width: 480px; background: var(--surface);
    border-radius: 14px; border: 1px solid var(--border);
    overflow: hidden; box-shadow: var(--shadow); position: relative;
  }
  .tt-corner, .tt-day-header {
    height: var(--header-h); display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border);
    position: sticky; top: 60px; background: var(--surface); z-index: 10;
  }
  .tt-corner { color: var(--text-faint); font-family: var(--mono); font-size: 11px; }
  .tt-day-header { flex-direction: column; gap: 2px; }
  .tt-day-header .day-ko { font-size: 14px; font-weight: 700; color: var(--text); }
  .tt-day-header .day-en { font-size: 10px; font-weight: 400; color: var(--text-faint); font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }
  .tt-day-header.today .day-ko { color: var(--accent); }
  .tt-day-header.today { background: var(--accent-light); }
  .tt-time-label {
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 10px; font-family: var(--mono); font-size: 10px;
    color: var(--text-faint); height: var(--cell-h);
    border-right: 1px solid var(--border); border-bottom: 1px dashed var(--border);
  }
  .tt-cell {
    position: relative; height: var(--cell-h);
    border-right: 1px solid var(--border); border-bottom: 1px dashed var(--border);
    cursor: pointer; transition: background 0.1s;
  }
  .tt-cell:last-child { border-right: none; }
  .tt-cell:hover { background: var(--accent-light); }

  /* SCHEDULE BLOCKS */
  .sched-block {
    position: absolute; border-radius: 8px; padding: 5px 8px;
    cursor: pointer; z-index: 5; overflow: hidden;
    transition: filter 0.15s, transform 0.1s; border: 1.5px solid transparent;
  }
  .sched-block:hover { filter: brightness(0.93); transform: scale(1.01); z-index: 6; }
  .sched-block:active { transform: scale(0.98); }
  .sched-block .blk-subject { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .sched-block .blk-time { font-size: 10px; font-family: var(--mono); opacity: 0.75; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sched-block .blk-memo { font-size: 10px; opacity: 0.7; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* TOOLTIP */
  .tooltip {
    position: fixed; background: var(--text); color: #fff;
    padding: 10px 14px; border-radius: 10px; font-size: 12px;
    max-width: 220px; z-index: 1000; pointer-events: none;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s; box-shadow: var(--shadow-lg);
  }
  .tooltip.visible { opacity: 1; transform: translateY(0); }
  .tooltip .tt-subject { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .tooltip .tt-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 3px; }
  .tooltip .tt-label { opacity: 0.6; min-width: 32px; }
  .tooltip .tt-val { font-weight: 500; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.38);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 16px; width: 100%; max-width: 440px;
    box-shadow: var(--shadow-lg); transform: translateY(16px) scale(0.97);
    transition: transform 0.2s; overflow: hidden;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.3px; }
  .form-input, .form-select {
    padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 8px;
    font-family: var(--font); font-size: 14px; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.15s; width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .color-swatch { width: 26px; height: 26px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s; }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: var(--text); }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px;
    border-radius: 50%; background: var(--accent); color: #fff; border: none;
    box-shadow: 0 4px 16px rgba(61,107,79,0.4); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s; z-index: 50;
  }
  .fab:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(61,107,79,0.5); }
  .fab:active { transform: scale(0.95); }
  .fab svg { width: 22px; height: 22px; }

  .notification {
    position: fixed; top: 72px; right: 16px;
    background: var(--text); color: #fff; padding: 10px 16px;
    border-radius: 10px; font-size: 13px; z-index: 300;
    box-shadow: var(--shadow-lg); transform: translateY(-8px);
    opacity: 0; transition: all 0.25s;
  }
  .notification.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    :root { --cell-h: 44px; --header-h: 48px; --time-w: 44px; }
    .app-header { padding: 0 1rem; height: 52px; }
    .timetable-wrap { padding: 0.75rem 0.75rem 2rem; }
    .notice-bar { margin: 0.75rem 0.75rem 0; }
    .btn span { display: none; }
    .sync-status .sync-label { display: none; }
    .modal { max-width: 100%; margin: 0 0.5rem; }
    .modal-body { padding: 16px; }
    .modal-header, .modal-footer { padding: 14px 16px; }
  }
  @media (max-width: 400px) {
    :root { --time-w: 38px; }
    .tt-day-header .day-en { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">방과후 시간표</div>
  <div class="header-actions">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="sync-label" id="sync-label">대기중</span>
    </div>
    <button class="btn btn-icon" onclick="loadFromSheets()" title="시트에서 불러오기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
    </button>
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span>추가</span>
    </button>
  </div>
</header>

<!-- 공지 한 줄 -->
<div class="notice-bar" id="notice-bar" onclick="openNoticeModal()">
  <span class="notice-icon">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  </span>
  <span class="notice-text" id="notice-text">이번 주 공지사항을 입력하세요...</span>
  <span class="notice-edit-hint">탭하여 편집</span>
</div>

<!-- 시간표 -->
<div class="timetable-wrap">
  <div class="timetable" id="timetable"></div>
</div>

<button class="fab" onclick="openAddModal()" title="일정 추가">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="tooltip" id="tooltip"></div>
<div class="notification" id="notification"></div>

<!-- 일정 추가/수정 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">일정 추가</span>
      <button onclick="closeModal()" style="border:none;background:none;cursor:pointer;padding:4px;display:flex">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">과목 / 학원</label>
        <input class="form-input" id="f-subject" placeholder="예: 수학학원, 태권도..." maxlength="30">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">요일</label>
          <select class="form-select" id="f-day">
            <option value="0">월요일</option><option value="1">화요일</option>
            <option value="2">수요일</option><option value="3">목요일</option>
            <option value="4">금요일</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">색상</label>
          <div class="color-picker-row" id="color-picker"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">시작 시간</label>
          <input class="form-input" id="f-start" type="time" min="12:00" max="20:00">
        </div>
        <div class="form-group">
          <label class="form-label">종료 시간</label>
          <input class="form-input" id="f-end" type="time" min="12:00" max="20:00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-input" id="f-memo" placeholder="선생님 연락처, 준비물 등..." maxlength="200" rows="3" style="resize:vertical;min-height:64px;line-height:1.5"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-delete" id="btn-delete" onclick="deleteSchedule()" style="margin-right:auto;display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        삭제
      </button>
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveSchedule()">저장</button>
    </div>
  </div>
</div>

<!-- 공지 수정 모달 -->
<div class="modal-overlay" id="notice-modal-overlay" onclick="closeNoticeModal(event)">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title">이번 주 공지</span>
      <button onclick="closeNoticeModal()" style="border:none;background:none;cursor:pointer;padding:4px;display:flex">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">공지사항</label>
        <textarea class="form-input" id="notice-input" placeholder="예: 수요일 태권도 휴관, 금요일 수학 숙제 있음..." rows="3" style="resize:vertical;min-height:80px;line-height:1.6" maxlength="200"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-delete" onclick="clearNotice()" style="margin-right:auto">지우기</button>
      <button class="btn" onclick="closeNoticeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveNotice()">저장</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ★ 여기에 Apps Script 웹앱 URL을 붙여넣으세요 ★
// ══════════════════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzFsJHkYYEu3fRwhhN8pR4hvt3e5iaRwmIVadMvVjLNHYHFlz4PW-HMUi-88MZLzgMLZA/exec';  // 예: 'https://script.google.com/macros/s/AKfy.../exec'

// ══════════════════════════════════════════════
const DAYS = ['월','화','수','목','금'];
const DAY_EN = ['MON','TUE','WED','THU','FRI'];
const TIME_START = 12, TIME_END = 20;
const PASTEL_COLORS = [
  {bg:'#FFD6D6',text:'#8B3A3A'},{bg:'#FFE8CC',text:'#8B5A1A'},
  {bg:'#FFF3CC',text:'#7A6020'},{bg:'#D6FFDB',text:'#2A7A40'},
  {bg:'#CCF0FF',text:'#1A5F8A'},{bg:'#E8D6FF',text:'#5E2A8A'},
  {bg:'#FFD6F0',text:'#8A2A5E'},{bg:'#D6F0FF',text:'#1A5A7A'},
  {bg:'#DFFFD6',text:'#2A6A2A'},{bg:'#FFE6D6',text:'#7A4020'},
];

let schedules = JSON.parse(localStorage.getItem('schedules') || '[]');
let notice = localStorage.getItem('notice') || '';
let selectedColor = PASTEL_COLORS[0];
let editingId = null;
let isSyncing = false;

// ── RENDER ──
function renderTimetable() {
  const wrap = document.getElementById('timetable');
  const todayIdx = new Date().getDay() - 1; // 0=월
  let html = `<div class="tt-corner">시간</div>`;
  DAYS.forEach((d, i) => {
    const cls = i === todayIdx ? 'tt-day-header today' : 'tt-day-header';
    html += `<div class="${cls}"><span class="day-ko">${d}</span><span class="day-en">${DAY_EN[i]}</span></div>`;
  });
  const slots = (TIME_END - TIME_START) * 2;
  for (let s = 0; s < slots; s++) {
    const mins = TIME_START * 60 + s * 30;
    const h = Math.floor(mins / 60), m = mins % 60;
    const label = m === 0 ? `${h}:00` : '';
    const bb = m === 0 ? 'border-bottom:1px solid var(--border)' : '';
    const isLast = s === slots - 1;
    html += `<div class="tt-time-label" style="${bb}">${label}</div>`;
    for (let d = 0; d < 5; d++) {
      html += `<div class="tt-cell" data-day="${d}" data-slot="${s}" onclick="cellClick(${d},${s})" style="${isLast?'border-bottom:none':''}"></div>`;
    }
  }
  wrap.innerHTML = html;
  schedules.forEach(sc => placeBlock(sc));
  renderNotice();
}

function placeBlock(sc) {
  const refCell = document.querySelector(`.tt-cell[data-day="${sc.day}"][data-slot="0"]`);
  if (!refCell) return;
  const tt = document.getElementById('timetable');
  const ttRect = tt.getBoundingClientRect();
  const cellRect = refCell.getBoundingClientRect();
  const cellH = refCell.offsetHeight;
  const [sh,sm] = sc.startTime.split(':').map(Number);
  const [eh,em] = sc.endTime.split(':').map(Number);
  const startMins = (sh - TIME_START)*60 + sm;
  const dur = (eh - TIME_START)*60 + em - startMins;
  const slot0top = cellRect.top - ttRect.top;
  const top = slot0top + (startMins/30)*cellH;
  const height = Math.max((dur/30)*cellH - 2, 24);
  const left = cellRect.left - ttRect.left + 4;
  const width = cellRect.width - 8;

  const el = document.createElement('div');
  el.className = 'sched-block';
  el.id = 'block-' + sc.id;
  el.style.cssText = `background:${sc.color.bg};border-color:${sc.color.bg};color:${sc.color.text};top:${top}px;height:${height}px;left:${left}px;width:${width}px;`;
  const showTime = dur >= 45, showMemo = dur >= 60 && sc.memo;
  el.innerHTML = `<div class="blk-subject">${esc(sc.subject)}</div>${showTime?`<div class="blk-time">${sc.startTime}–${sc.endTime}</div>`:''}${showMemo?`<div class="blk-memo">${esc(sc.memo.split('\n')[0])}</div>`:''}`;
  el.addEventListener('click', e => { e.stopPropagation(); openEditModal(sc.id); });
  el.addEventListener('mouseenter', e => showTooltip(e, sc));
  el.addEventListener('mouseleave', hideTooltip);
  el.addEventListener('mousemove', moveTooltip);
  tt.appendChild(el);
}

function renderNotice() {
  const el = document.getElementById('notice-text');
  if (notice) {
    el.textContent = notice.replace(/\n/g,' · ');
    el.classList.add('has-content');
  } else {
    el.textContent = '이번 주 공지사항을 입력하세요...';
    el.classList.remove('has-content');
  }
}

// ── TOOLTIP ──
const tooltip = document.getElementById('tooltip');
function showTooltip(e, sc) {
  tooltip.innerHTML = `<div class="tt-subject">${esc(sc.subject)}</div>
    <div class="tt-row"><span class="tt-label">요일</span><span class="tt-val">${DAYS[sc.day]}요일</span></div>
    <div class="tt-row"><span class="tt-label">시간</span><span class="tt-val">${sc.startTime} – ${sc.endTime}</span></div>
    ${sc.memo?`<div class="tt-row"><span class="tt-label">메모</span><span class="tt-val" style="white-space:pre-line">${esc(sc.memo)}</span></div>`:''}`;
  moveTooltip(e); tooltip.classList.add('visible');
}
function moveTooltip(e) {
  const x = e.clientX+14, y = e.clientY-10;
  const w = tooltip.offsetWidth||180, h = tooltip.offsetHeight||80;
  tooltip.style.left = (x+w>innerWidth?x-w-28:x)+'px';
  tooltip.style.top = (y+h>innerHeight?y-h:y)+'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// ── MODAL: 일정 ──
function openAddModal(prefDay) {
  editingId = null;
  document.getElementById('modal-title').textContent = '일정 추가';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-subject').value = '';
  document.getElementById('f-day').value = prefDay ?? 0;
  document.getElementById('f-start').value = '14:00';
  document.getElementById('f-end').value = '16:00';
  document.getElementById('f-memo').value = '';
  document.getElementById('btn-delete').style.display = 'none';
  setSelectedColor(PASTEL_COLORS[Math.floor(Math.random()*PASTEL_COLORS.length)]);
  renderColorPicker();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-subject').focus(), 200);
}
function openEditModal(id) {
  const sc = schedules.find(s => s.id === id);
  if (!sc) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '일정 수정';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-subject').value = sc.subject;
  document.getElementById('f-day').value = sc.day;
  document.getElementById('f-start').value = sc.startTime;
  document.getElementById('f-end').value = sc.endTime;
  document.getElementById('f-memo').value = sc.memo || '';
  document.getElementById('btn-delete').style.display = 'flex';
  setSelectedColor(sc.color);
  renderColorPicker();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
function cellClick(day, slot) {
  const h = Math.floor(TIME_START + slot/2);
  const m = slot%2===0?'00':'30';
  openAddModal(day);
  document.getElementById('f-start').value = `${String(h).padStart(2,'0')}:${m}`;
  const endH = m==='00'?h:h+1, endM = m==='00'?'30':'00';
  document.getElementById('f-end').value = `${String(endH).padStart(2,'0')}:${endM}`;
}
function renderColorPicker() {
  document.getElementById('color-picker').innerHTML = PASTEL_COLORS.map((c,i)=>
    `<div class="color-swatch ${c.bg===selectedColor.bg?'selected':''}" style="background:${c.bg}" onclick="pickColor(${i})"></div>`
  ).join('');
}
function pickColor(i) { setSelectedColor(PASTEL_COLORS[i]); renderColorPicker(); }
function setSelectedColor(c) { selectedColor = c; }

function saveSchedule() {
  const subject = document.getElementById('f-subject').value.trim();
  const day = parseInt(document.getElementById('f-day').value);
  const startTime = document.getElementById('f-start').value;
  const endTime = document.getElementById('f-end').value;
  const memo = document.getElementById('f-memo').value.trim();
  if (!subject) { document.getElementById('f-subject').style.borderColor='var(--danger)'; document.getElementById('f-subject').focus(); return; }
  if (!startTime||!endTime||startTime>=endTime) { notify('시간을 올바르게 입력해주세요'); return; }
  if (editingId) {
    const idx = schedules.findIndex(s=>s.id===editingId);
    if (idx>=0) schedules[idx] = {...schedules[idx], subject, day, startTime, endTime, memo, color: selectedColor};
  } else {
    schedules.push({id: Date.now().toString(), subject, day, startTime, endTime, memo, color: selectedColor});
  }
  saveLocal(); closeModal(); renderTimetable();
  notify(editingId ? '수정되었습니다 ✓' : '추가되었습니다 ✓');
  uploadToSheets();
}
function deleteSchedule() {
  if (!editingId) return;
  schedules = schedules.filter(s=>s.id!==editingId);
  saveLocal(); closeModal(); renderTimetable();
  notify('삭제되었습니다');
  uploadToSheets();
}
function saveLocal() { localStorage.setItem('schedules', JSON.stringify(schedules)); }

// ── MODAL: 공지 ──
function openNoticeModal() {
  document.getElementById('notice-input').value = notice;
  document.getElementById('notice-modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('notice-input').focus(), 200);
}
function closeNoticeModal(e) {
  if (e && e.target !== document.getElementById('notice-modal-overlay')) return;
  document.getElementById('notice-modal-overlay').classList.remove('open');
}
function saveNotice() {
  notice = document.getElementById('notice-input').value.trim();
  localStorage.setItem('notice', notice);
  renderNotice();
  closeNoticeModal();
  uploadToSheets();
}
function clearNotice() {
  notice = '';
  localStorage.setItem('notice', '');
  renderNotice();
  closeNoticeModal();
  uploadToSheets();
}

// ── GOOGLE SHEETS 동기화 ──
// 저장: iframe form POST (CORS 우회)
// 불러오기: JSONP (CORS 우회)

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot' + (state?' '+state:'');
  document.getElementById('sync-label').textContent = label;
}

function uploadToSheets() {
  if (!SHEETS_URL) return;
  if (isSyncing) return;
  isSyncing = true;
  setSyncStatus('syncing', '저장 중...');

  const iframeId = 'sf-' + Date.now();
  const iframe = document.createElement('iframe');
  iframe.name = iframeId;
  iframe.style.display = 'none';
  document.body.appendChild(iframe);

  const form = document.createElement('form');
  form.method = 'POST';
  form.action = SHEETS_URL;
  form.target = iframeId;
  form.style.display = 'none';

  const inp = document.createElement('input');
  inp.type = 'hidden';
  inp.name = 'payload';
  inp.value = JSON.stringify({ action: 'sync', schedules, notice });
  form.appendChild(inp);
  document.body.appendChild(form);

  const cleanup = () => { iframe.remove(); form.remove(); isSyncing = false; };
  setTimeout(() => { cleanup(); setSyncStatus('ok', '저장됨'); }, 4000);
  iframe.onload = () => { cleanup(); setSyncStatus('ok', '저장됨'); };
  form.submit();
}

function loadFromSheets() {
  if (!SHEETS_URL) { setSyncStatus('', '오프라인'); return; }
  setSyncStatus('syncing', '불러오는 중...');
  const cbName = '__cb_' + Date.now();
  const script = document.createElement('script');
  const timer = setTimeout(() => {
    script.remove(); delete window[cbName];
    setSyncStatus('error', '로드 실패');
    notify('구글 시트 연결 실패');
  }, 10000);

  window[cbName] = function(data) {
    clearTimeout(timer); script.remove(); delete window[cbName];
    if (data && Array.isArray(data.schedules)) {
      schedules = data.schedules;
      saveLocal();
    }
    if (data && typeof data.notice === 'string') {
      notice = data.notice;
      localStorage.setItem('notice', notice);
    }
    renderTimetable();
    setSyncStatus('ok', '연결됨');
    notify('불러오기 완료 ✓');
  };

  script.src = SHEETS_URL + '?action=load&callback=' + cbName;
  script.onerror = () => {
    clearTimeout(timer); delete window[cbName];
    setSyncStatus('error', '로드 실패');
    notify('구글 시트 연결 실패 — URL을 확인해주세요');
  };
  document.head.appendChild(script);
}

// ── UTILS ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let notifTimer;
function notify(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── INIT ──
window.addEventListener('load', () => {
  renderTimetable();
  if (SHEETS_URL) {
    loadFromSheets();
  } else {
    setSyncStatus('', '오프라인');
  }
});
window.addEventListener('resize', renderTimetable);
</script>
